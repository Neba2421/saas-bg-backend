name: Deploy to Hugging Face Spaces

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test HF Token (Debug)
        run: |
          echo "Token starts with: ${#HF_TOKEN} characters"
          echo "Username: ${{ secrets.HF_USERNAME }}"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Login to Hugging Face
        run: |
          echo "${{ secrets.HF_TOKEN }}" | docker login hf.co -u "${{ secrets.HF_USERNAME }}" --password-stdin

      - name: Build and Push Docker image
        run: |
          docker build --platform linux/amd64 -t "hf.co/spaces/${{ secrets.HF_USERNAME }}/background-remover-api:latest" .
          docker push "hf.co/spaces/${{ secrets.HF_USERNAME }}/background-remover-api:latest"

      - name: Restart Space
        run: |
          curl -X POST \
            "https://huggingface.co/api/spaces/${{ secrets.HF_USERNAME }}/background-remover-api/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"